{% extends 'base.html' %}

{% block namespace %}login{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="glass-card">
        <div class="avatar-header">
            <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14.5C14.86,14.5 17.82,15.93 18.84,17H5.16C6.18,15.93 9.14,14.5 12,14.5Z"/></svg>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <span class="icon">✉</span>
                <input type="email" id="email" name="email" placeholder="Email ID" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <span class="icon">🔒</span>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn-login">LOGIN</button>
            <div id="errorMessage" class="error-msg"></div>
        </form>
    </div>
</div>

<script>
    // AJAX login handle tanpa reload
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const errorDiv = document.getElementById('errorMessage');
        
        try {
            const response = await fetch('/login', { method: 'POST', body: formData });
            const data = await response.json();
            if (response.ok) {
                window.location.href = data.redirect;
            } else {
                errorDiv.innerText = data.message;
            }
        } catch (err) {
            errorDiv.innerText = "Terjadi kesalahan sistem.";
        }
    });
</script>
{% endblock %}
